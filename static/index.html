<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dailies</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Dailies</h1>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="overview" role="tab" aria-selected="true">Overview</button>
      <button class="tab" data-tab="daily" role="tab" aria-selected="false">Daily</button>
      <button class="tab" data-tab="weekly" role="tab" aria-selected="false">Weekly</button>
      <button class="tab" data-tab="reminders" role="tab" aria-selected="false">Reminders</button>
    </nav>
  </header>

  <main>
    <!-- Overview / Dashboard -->
    <section id="overview" class="tab-panel" role="tabpanel">
      <div id="overview-content"></div>
    </section>

    <!-- Daily tasks -->
    <section id="daily" class="tab-panel" role="tabpanel" hidden>
      <div class="task-groups" id="daily-groups"></div>
      <form class="add-form" id="daily-add-form">
        <select id="daily-group-select" aria-label="Group">
          <option value="">Anytime</option>
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
        </select>
        <input type="text" placeholder="Add a daily task…" id="daily-input" autocomplete="off">
        <button type="submit">Add</button>
      </form>
    </section>

    <!-- Weekly tasks -->
    <section id="weekly" class="tab-panel" role="tabpanel" hidden>
      <ul class="task-list" id="weekly-list"></ul>
      <form class="add-form" id="weekly-add-form">
        <input type="text" placeholder="Add a weekly task…" id="weekly-input" autocomplete="off">
        <button type="submit">Add</button>
      </form>
    </section>

    <!-- Reminders -->
    <section id="reminders" class="tab-panel" role="tabpanel" hidden>
      <div class="reminder-list" id="reminder-list"></div>
      <form class="add-form" id="reminder-add-form">
        <input type="text" placeholder="Add a reminder…" id="reminder-input" autocomplete="off">
        <button type="submit">Add</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
